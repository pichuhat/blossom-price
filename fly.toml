# fly.toml app configuration file generated for blossom-price on 2026-07-04T14:00:19Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'blossom-price'
primary_region = 'iad'

[build]
  dockerfile = "backend/Dockerfile"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
