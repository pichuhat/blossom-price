<html lang="en">
<head>
    <title>BCpricer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
<app-view></app-view>

<script type="module" src="https://bc-pricer.onrender.com/src/app-root.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);

    try {
        if (params.get('linkPopup') == "2") {
            //REPLACE WITH POPUP
            window.alert("Failed to login: please join the BlossomCraft discord server and follow the instructions to link your minecraft account to the server.")
        } else if (params.get('linkPopup') == "1") {
            window.alert("Failed to login: your minecraft account isn't linked to the BlossomCraft discord server.")
        }
    } catch(error) {
        console.log("No login failure code found")
    }
</script>
</body>
</html>
