name: Daily App Restart

on:
  schedule:
    - cron: '19 3 * * *'
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Cleaned up the installation step
      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@1.5

      # Step 2: Pass the token as an environment variable to the restart command
      - name: Restart Fly App
        run: flyctl apps restart blossom-price
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
